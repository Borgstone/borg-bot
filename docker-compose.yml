services:
  research-optimize:
    profiles: ["research"]
    image: borg-bot:local
    command: python -m borgbot.research.optimizer  
    volumes:
      - /opt/borg/data:/app/data
      - /opt/borg/research:/app/research
  research:
    profiles: ["research"]
    build: .
    image: borg-bot:local
    container_name: borg-research
    volumes:
      - /opt/borg/state:/app/state
      - /opt/borg/logs:/app/logs
      - /opt/borg/data:/app/data
      - ./src:/app/src
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
    entrypoint: ["python", "-m", "borgbot.backtest.run"]
  borg-btc-1m:
    user: "1005:1005"
    build: .
    image: borg-bot:local
    container_name: borg-btc-1m
    restart: unless-stopped
    command: ["sh","-lc","sleep 0 && python -m borgbot.app.paper_runner"]
    environment:
      TZ: Europe/Dublin
      EXCHANGE: kucoin
      SYMBOL: BTC/USDT
      TIMEFRAME: 1m
      SMA_FAST: 9
      SMA_SLOW: 21
      FEES_BPS: 10
      SLIPPAGE_PCT: 0.0005
      STARTING_CASH: 1000
      POLL_SECONDS: 15
      DB_PATH: /app/state/btcusdt_1m.db
      LOG_PATH: /app/logs/btcusdt_1m.jsonl
    volumes:
      - /opt/borg/state:/app/state
      - /opt/borg/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "[ -s /app/logs/btcusdt_1m.jsonl ] && [ $(( $(date +%s) - $(stat -c %Y /app/logs/btcusdt_1m.jsonl) )) -lt 120 ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

